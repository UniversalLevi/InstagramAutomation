{% extends "base.html" %}

{% block title %}{% if success %}Token saved{% else %}OAuth error{% endif %} – TikTok Posting Manager{% endblock %}

{% block content %}
<div class="container">
    <h2>{% if success %}Token saved{% else %}Something went wrong{% endif %}</h2>
    <p class="oauth-result-message {% if success %}oauth-success{% else %}oauth-error{% endif %}">{{ message }}</p>
    <p class="oauth-back"><a href="{{ url_for('index') }}" class="btn btn-primary">Back to Dashboard</a></p>
</div>
{% endblock %}
